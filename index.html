<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL.ZAEIM | MR.TAMER NAGEH</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a0505;
  --bg2: #200808;
  --panel: #2a0a0a;
  --gold: #C9A84C;
  --gold2: #e8c96a;
  --gold3: #8B6914;
  --red: #8B1A1A;
  --red2: #6B0F0F;
  --red3: #c0392b;
  --text: #f5e6c8;
  --muted: #9a7a5a;
  --border: rgba(201,168,76,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden;}

/* ====== SCROLLBAR ====== */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}

/* ====== NAV ====== */
nav{
  position:fixed;top:0;width:100%;z-index:999;
  background:rgba(20,4,4,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 2rem;height:70px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo img{height:48px;width:48px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(201,168,76,0.4));}
.nav-logo-text{font-size:1.4rem;font-weight:900;color:var(--gold);letter-spacing:0.1em;}
.nav-links{display:flex;gap:0;list-style:none;}
.nav-links a{
  color:var(--muted);text-decoration:none;font-size:0.82rem;font-weight:600;
  padding:0.5rem 1rem;letter-spacing:0.08em;transition:all 0.3s;
  border-bottom:2px solid transparent;display:block;
}
.nav-links a:hover,.nav-links a.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-btn{
  padding:0.55rem 1.4rem;background:var(--gold);color:var(--bg);
  font-family:'Cairo',sans-serif;font-weight:700;font-size:0.82rem;
  border:none;cursor:pointer;letter-spacing:0.08em;transition:all 0.3s;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
}
.nav-btn:hover{background:var(--gold2);}

/* ====== HERO ====== */
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding-top:70px;
  background:radial-gradient(ellipse 80% 70% at 50% 0%, rgba(139,26,26,0.25) 0%, transparent 65%),
             radial-gradient(ellipse 60% 50% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 60%),
             var(--bg);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);
  background-size:50px 50px;
}
.hero-glow{
  position:absolute;top:20%;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(139,26,26,0.15) 0%, transparent 70%);
  pointer-events:none;
}
.hero-content{position:relative;z-index:2;text-align:center;padding:2rem;}
.hero-logo-wrap{
  position:relative;display:inline-block;margin-bottom:2rem;
  animation:floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.hero-logo{
  width:260px;height:260px;object-fit:cover;
  border-radius:50%;
  border:3px solid rgba(201,168,76,0.4);
  filter:drop-shadow(0 0 40px rgba(201,168,76,0.5)) drop-shadow(0 0 80px rgba(139,26,26,0.4));
  mix-blend-mode:normal;
}
.hero-logo-ring{
  position:absolute;inset:-20px;border-radius:50%;
  border:1px solid rgba(201,168,76,0.25);
  animation:ringPulse 3s ease infinite;
}
.hero-logo-ring2{
  position:absolute;inset:-40px;border-radius:50%;
  border:1px solid rgba(201,168,76,0.1);
  animation:ringPulse 3s ease infinite 0.5s;
}
@keyframes ringPulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
.hero-tag{
  font-size:0.75rem;letter-spacing:0.45em;color:var(--gold);
  text-transform:uppercase;margin-bottom:1rem;
  opacity:0;animation:fadeUp 0.8s ease 0.2s forwards;
}
.hero-name{
  font-size:clamp(3rem,8vw,6.5rem);font-weight:900;line-height:0.95;
  color:var(--text);
  opacity:0;animation:fadeUp 0.8s ease 0.5s forwards;
}
.hero-name .gold{
  display:block;
  background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-divider{
  width:100px;height:2px;margin:1.5rem auto;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;animation:fadeUp 0.8s ease 0.7s forwards;
}
.hero-sub{
  font-size:clamp(1rem,2.5vw,1.25rem);color:var(--muted);font-weight:300;
  letter-spacing:0.12em;
  opacity:0;animation:fadeUp 0.8s ease 0.9s forwards;
}
.hero-bio{
  margin-top:1.5rem;max-width:680px;margin-left:auto;margin-right:auto;
  opacity:0;animation:fadeUp 0.8s ease 1.05s forwards;
}
.hero-bio-en{
  font-size:clamp(0.82rem,1.8vw,0.97rem);color:rgba(201,168,76,0.65);
  letter-spacing:0.08em;font-weight:500;text-transform:uppercase;
  border-top:1px solid rgba(201,168,76,0.15);
  border-bottom:1px solid rgba(201,168,76,0.15);
  padding:0.7rem 1.5rem;margin-bottom:0.7rem;
  line-height:1.7;
}
.hero-bio-ar{
  font-size:clamp(0.88rem,2vw,1.05rem);color:var(--muted);
  letter-spacing:0.04em;font-weight:400;line-height:1.8;
}
.hero-exp-badge{
  display:inline-flex;align-items:center;gap:0.5rem;
  margin-top:1.2rem;padding:0.55rem 1.4rem;
  background:linear-gradient(135deg,rgba(139,26,26,0.25),rgba(201,168,76,0.08));
  border:1px solid rgba(201,168,76,0.3);
  font-size:0.85rem;font-weight:700;color:var(--gold);letter-spacing:0.12em;
  opacity:0;animation:fadeUp 0.8s ease 1.1s forwards;
}
.hero-exp-badge .exp-num{
  font-size:1.6rem;font-weight:900;color:var(--gold);font-family:'Tajawal',sans-serif;
  line-height:1;
}
.hero-badges{
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;
  opacity:0;animation:fadeUp 0.8s ease 1.1s forwards;
}
.badge{
  padding:0.45rem 1.2rem;border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);font-size:0.78rem;font-weight:700;letter-spacing:0.1em;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  background:rgba(201,168,76,0.04);transition:all 0.3s;
}
.badge:hover{background:rgba(201,168,76,0.12);border-color:var(--gold2);}
.hero-cta{
  display:flex;gap:1rem;justify-content:center;margin-top:2.5rem;
  opacity:0;animation:fadeUp 0.8s ease 1.3s forwards;
}
.btn-primary{
  padding:0.8rem 2.5rem;background:var(--gold);color:var(--bg);
  font-family:'Cairo',sans-serif;font-weight:900;font-size:0.95rem;
  border:none;cursor:pointer;letter-spacing:0.1em;transition:all 0.3s;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,0.2);}
.btn-secondary{
  padding:0.8rem 2.5rem;background:transparent;color:var(--gold);
  font-family:'Cairo',sans-serif;font-weight:700;font-size:0.95rem;
  border:1px solid rgba(201,168,76,0.4);cursor:pointer;letter-spacing:0.1em;transition:all 0.3s;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.btn-secondary:hover{border-color:var(--gold);background:rgba(201,168,76,0.07);}

/* ====== SCROLL DOWN ====== */
.scroll-down{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  opacity:0;animation:fadeUp 0.8s ease 1.8s forwards;
}
.scroll-line{width:1px;height:50px;background:linear-gradient(var(--gold),transparent);animation:scrollAnim 2s ease infinite;}
@keyframes scrollAnim{0%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}51%{transform:scaleY(1);transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(25px);}to{opacity:1;transform:translateY(0);}}

/* ====== SECTIONS ====== */
section{padding:5rem 2rem;}
.container{max-width:1100px;margin:0 auto;}
.sec-header{text-align:center;margin-bottom:3.5rem;}
.sec-tag{font-size:0.72rem;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:0.8rem;}
.sec-title{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:var(--text);}
.sec-line{width:70px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.2rem auto;}

/* ====== ABOUT ====== */
#about{background:var(--bg2);}
.about-grid{display:grid;grid-template-columns:1fr 2fr;gap:4rem;align-items:center;}
.about-img-wrap{position:relative;}
.about-img{
  width:100%;aspect-ratio:3/4;background:var(--panel);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.about-img-logo{width:70%;opacity:0.15;}
.about-corner{position:absolute;width:25px;height:25px;border-color:var(--gold);border-style:solid;opacity:0.6;}
.about-corner.tl{top:8px;right:8px;border-width:0 1px 0 0;border-top:1px solid var(--gold);}
.about-corner.br{bottom:8px;left:8px;border-width:0 0 1px 0;border-right:none;border-left:1px solid var(--gold);}
.about-badge{
  position:absolute;bottom:-12px;right:-12px;
  background:var(--gold);color:var(--bg);padding:0.6rem 1rem;
  font-weight:900;font-size:0.72rem;letter-spacing:0.1em;
}
.about-text h3{font-size:1.6rem;font-weight:700;color:var(--text);margin-bottom:1.2rem;}
.about-text p{color:var(--muted);line-height:2;font-size:0.95rem;font-weight:300;margin-bottom:1rem;}
.about-stats{display:flex;gap:1.5rem;margin-top:2rem;}
.stat{
  flex:1;text-align:center;padding:1.2rem;
  border:1px solid var(--border);background:rgba(201,168,76,0.02);
}
.stat-n{font-size:2.2rem;font-weight:900;color:var(--gold);display:block;font-family:'Tajawal',sans-serif;}
.stat-l{font-size:0.72rem;color:var(--muted);letter-spacing:0.12em;margin-top:0.3rem;}

/* ====== COURSES ====== */
#courses{background:var(--bg);}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2px;}
.course-card{
  background:var(--panel);padding:2.5rem 2rem;position:relative;
  overflow:hidden;transition:all 0.4s;cursor:pointer;border:1px solid transparent;
}
.course-card::before{
  content:'';position:absolute;top:0;right:0;width:3px;height:0;
  background:var(--gold);transition:height 0.4s;
}
.course-card:hover::before{height:100%;}
.course-card:hover{background:var(--bg2);border-color:var(--border);transform:translateY(-3px);}
.course-icon{font-size:3rem;margin-bottom:1.2rem;display:block;}
.course-month{
  font-size:0.72rem;letter-spacing:0.3em;color:var(--gold);
  text-transform:uppercase;margin-bottom:0.5rem;
}
.course-name{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:0.8rem;}
.course-desc{color:var(--muted);font-size:0.88rem;line-height:1.8;font-weight:300;}
.course-lessons{
  margin-top:1.2rem;display:flex;align-items:center;gap:0.5rem;
  color:var(--gold);font-size:0.8rem;font-weight:600;
}

/* ====== FEATURES ====== */
#features{background:var(--bg2);}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem;}
.feat{text-align:center;padding:2.5rem 1.5rem;background:var(--panel);border:1px solid var(--border);transition:all 0.3s;}
.feat:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-4px);}
.feat-icon{font-size:2.8rem;margin-bottom:1.2rem;}
.feat-title{font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:0.7rem;}
.feat-desc{font-size:0.85rem;color:var(--muted);line-height:1.8;font-weight:300;}

/* ====== AUTH MODAL ====== */
.overlay{
  position:fixed;inset:0;background:rgba(10,2,2,0.92);backdrop-filter:blur(10px);
  z-index:2000;display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:1rem 0;
}
.overlay.active{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);width:90%;max-width:440px;
  padding:2rem;position:relative;margin:auto;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.modal-close{
  position:absolute;top:1rem;left:1rem;background:none;border:none;
  color:var(--muted);font-size:1.2rem;cursor:pointer;transition:color 0.3s;
}
.modal-close:hover{color:var(--gold);}
.modal-logo{text-align:center;margin-bottom:2rem;}
.modal-logo img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(201,168,76,0.3));}
.modal-title{font-size:1.5rem;font-weight:900;color:var(--gold);text-align:center;margin-bottom:0.3rem;}
.modal-sub{font-size:0.82rem;color:var(--muted);text-align:center;margin-bottom:2rem;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;}
.tab{
  flex:1;padding:0.7rem;text-align:center;background:none;border:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.88rem;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.field{margin-bottom:1.2rem;}
.field label{display:block;font-size:0.78rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.4rem;font-weight:600;}
.field input,.field select{
  width:100%;padding:0.8rem 1rem;background:var(--panel);
  border:1px solid var(--border);color:var(--text);
  font-family:'Cairo',sans-serif;font-size:0.9rem;outline:none;transition:border 0.3s;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:var(--panel);}
.btn-full{
  width:100%;padding:0.85rem;background:var(--gold);color:var(--bg);
  font-family:'Cairo',sans-serif;font-weight:900;font-size:0.95rem;
  border:none;cursor:pointer;letter-spacing:0.1em;transition:all 0.3s;margin-top:0.5rem;
}
.btn-full:hover{background:var(--gold2);}
.msg{font-size:0.82rem;text-align:center;margin-top:1rem;padding:0.7rem;border-radius:2px;}
.msg.success{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.msg.error{background:rgba(139,26,26,0.15);color:#e07070;border:1px solid rgba(139,26,26,0.3);}

/* ====== STUDENT DASHBOARD ====== */
#dashboard{display:none;}
.dash-hero{
  min-height:35vh;background:var(--bg2);
  padding:6rem 2rem 3rem;text-align:center;
  border-bottom:1px solid var(--border);position:relative;overflow:hidden;
}
.dash-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(139,26,26,0.2),transparent 70%);
}
.dash-welcome{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900;color:var(--text);position:relative;}
.dash-welcome span{color:var(--gold);}
.dash-qr-area{
  background:var(--panel);border:1px solid var(--border);padding:1.5rem;
  display:inline-flex;flex-direction:column;align-items:center;gap:0.8rem;
  margin-top:1.5rem;position:relative;
}
.dash-qr-area canvas{border:3px solid var(--gold);}
.dash-qr-label{font-size:0.75rem;color:var(--gold);letter-spacing:0.2em;}
/* ====== HAMBURGER MENU ====== */
.hamburger-btn{
  display:flex;flex-direction:column;justify-content:center;gap:5px;
  width:40px;height:40px;background:none;border:1px solid rgba(201,168,76,0.25);
  cursor:pointer;padding:8px;transition:all 0.3s;flex-shrink:0;
}
.hamburger-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.hamburger-btn span{
  display:block;height:2px;background:var(--text);
  transition:all 0.3s;transform-origin:center;
}
.hamburger-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
/* SIDE DRAWER */
.side-drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1100;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.side-drawer-overlay.open{opacity:1;pointer-events:all;}
.side-drawer{
  position:fixed;right:0;top:0;bottom:0;width:280px;
  background:var(--bg2);border-left:1px solid var(--border);
  z-index:1200;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;overflow-y:auto;
}
.side-drawer.open{transform:translateX(0);}
.drawer-header{
  padding:1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--red2),rgba(80,10,10,0.8));
  flex-shrink:0;
}
.drawer-logo{display:flex;align-items:center;gap:0.8rem;}
.drawer-logo-text{font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:0.2em;}
.drawer-close{
  background:none;border:none;color:var(--muted);font-size:1.3rem;
  cursor:pointer;padding:0.3rem;transition:color 0.3s;line-height:1;
}
.drawer-close:hover{color:var(--text);}
.drawer-section{
  padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.drawer-section-label{
  padding:0.8rem 1.5rem 0.3rem;font-size:0.6rem;color:rgba(201,168,76,0.45);
  letter-spacing:0.22em;font-weight:700;text-transform:uppercase;
}
.drawer-item{
  display:flex;align-items:center;gap:0.9rem;
  padding:0.85rem 1.5rem;cursor:pointer;
  color:var(--muted);font-size:0.9rem;font-weight:600;
  transition:all 0.2s;border-right:3px solid transparent;
}
.drawer-item:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.drawer-item.active-item{color:var(--gold);background:rgba(201,168,76,0.06);border-right-color:var(--gold);}
.drawer-item .d-icon{font-size:1.1rem;width:24px;text-align:center;}
.drawer-footer{
  margin-top:auto;padding:1.2rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0;
}
.drawer-user{font-size:0.82rem;color:var(--muted);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.drawer-logout-btn{
  width:100%;padding:0.6rem;background:rgba(139,26,26,0.2);
  color:#e07070;border:1px solid rgba(139,26,26,0.3);
  font-family:'Cairo',sans-serif;font-size:0.82rem;cursor:pointer;
  transition:all 0.3s;
}
.drawer-logout-btn:hover{background:rgba(139,26,26,0.4);color:var(--text);}
/* hide old nav */
.dash-nav{display:none;}
.dash-page{display:none;padding:3rem 2rem;}
.dash-page.active{display:block;}
.dash-page-container{max-width:1000px;margin:0 auto;}

/* ====== PAGE TITLES ====== */
.page-title{
  display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;
  padding-bottom:1rem;border-bottom:1px solid var(--border);
}
.page-title-icon{font-size:2rem;}
.page-title h2{font-size:1.8rem;font-weight:900;color:var(--text);}
.page-title span{font-size:0.8rem;color:var(--gold);letter-spacing:0.15em;}

/* ====== COURSES PAGE ====== */
.month-tabs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;}
.month-tab{
  padding:0.45rem 1rem;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;
  cursor:pointer;transition:all 0.3s;
}

section{padding:5rem 2rem;}

/* ====== COURSES ====== */
#courses{background:var(--bg);}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2px;}
.course-card{
  background:var(--panel);padding:2.5rem 2rem;position:relative;
  overflow:hidden;transition:all 0.4s;cursor:pointer;border:1px solid transparent;
}
.course-card::before{

}
.course-card:hover::before{height:100%;}
.course-card:hover{background:var(--bg2);border-color:var(--border);transform:translateY(-3px);}
.course-icon{font-size:3rem;margin-bottom:1.2rem;display:block;}
.course-month{
  font-size:0.72rem;letter-spacing:0.3em;color:var(--gold);
  text-transform:uppercase;margin-bottom:0.5rem;
}
.course-name{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:0.8rem;}
.course-desc{color:var(--muted);font-size:0.88rem;line-height:1.8;font-weight:300;}
.course-lessons{
  margin-top:1.2rem;display:flex;align-items:center;gap:0.5rem;
  color:var(--gold);font-size:0.8rem;font-weight:600;
}

#features{background:var(--bg2);}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem;}
.feat{text-align:center;padding:2.5rem 1.5rem;background:var(--panel);border:1px solid var(--border);transition:all 0.3s;}

.feat-title{font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:0.7rem;}
.feat-desc{font-size:0.85rem;color:var(--muted);line-height:1.8;font-weight:300;}

/* ====== AUTH MODAL ====== */
.overlay{
  position:fixed;inset:0;background:rgba(10,2,2,0.92);backdrop-filter:blur(10px);
  z-index:2000;display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:1rem 0;
}
.overlay.active{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);width:90%;max-width:440px;
  padding:2rem;position:relative;margin:auto;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.modal-close{
  position:absolute;top:1rem;left:1rem;background:none;border:none;
  color:var(--muted);font-size:1.2rem;cursor:pointer;transition:color 0.3s;
}
.modal-close:hover{color:var(--gold);}
.modal-logo{text-align:center;margin-bottom:2rem;}
.modal-logo img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(201,168,76,0.3));}
.modal-title{font-size:1.5rem;font-weight:900;color:var(--gold);text-align:center;margin-bottom:0.3rem;}
.modal-sub{font-size:0.82rem;color:var(--muted);text-align:center;margin-bottom:2rem;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;}
.tab{
  flex:1;padding:0.7rem;text-align:center;background:none;border:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.88rem;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.field{margin-bottom:1.2rem;}
.field label{display:block;font-size:0.78rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.4rem;font-weight:600;}
.field input,.field select{
  width:100%;padding:0.8rem 1rem;background:var(--panel);
  border:1px solid var(--border);color:var(--text);
  font-family:'Cairo',sans-serif;font-size:0.9rem;outline:none;transition:border 0.3s;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:var(--panel);}
.btn-full{
  width:100%;padding:0.85rem;background:var(--gold);color:var(--bg);
  font-family:'Cairo',sans-serif;font-weight:900;font-size:0.95rem;
  border:none;cursor:pointer;letter-spacing:0.1em;transition:all 0.3s;margin-top:0.5rem;
}
.btn-full:hover{background:var(--gold2);}
.msg{font-size:0.82rem;text-align:center;margin-top:1rem;padding:0.7rem;border-radius:2px;}
.msg.success{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.msg.error{background:rgba(139,26,26,0.15);color:#e07070;border:1px solid rgba(139,26,26,0.3);}

/* ====== STUDENT DASHBOARD ====== */
#dashboard{display:none;}
.dash-hero{
  min-height:35vh;background:var(--bg2);
  padding:6rem 2rem 3rem;text-align:center;
  border-bottom:1px solid var(--border);position:relative;overflow:hidden;
}
.dash-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(139,26,26,0.2),transparent 70%);
}
.dash-welcome{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900;color:var(--text);position:relative;}
.dash-welcome span{color:var(--gold);}
.dash-qr-area{
  background:var(--panel);border:1px solid var(--border);padding:1.5rem;
  display:inline-flex;flex-direction:column;align-items:center;gap:0.8rem;
  margin-top:1.5rem;position:relative;
}

.dash-qr-label{font-size:0.75rem;color:var(--gold);letter-spacing:0.2em;}
/* ====== HAMBURGER MENU ====== */
.hamburger-btn{
  display:flex;flex-direction:column;justify-content:center;gap:5px;
  width:40px;height:40px;background:none;border:1px solid rgba(201,168,76,0.25);
  cursor:pointer;padding:8px;transition:all 0.3s;flex-shrink:0;
}
.hamburger-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.05);}

  display:block;height:2px;background:var(--text);
  transition:all 0.3s;transform-origin:center;

.hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

}

}

  padding:0.85rem 1.5rem;cursor:pointer;

  transition:all 0.2s;border-right:3px solid transparent;
}

.drawer-logout-btn{
  width:100%;padding:0.6rem;background:rgba(139,26,26,0.2);
  color:#e07070;border:1px solid rgba(139,26,26,0.3);
  font-family:'Cairo',sans-serif;font-size:0.82rem;cursor:pointer;
  transition:all 0.3s;
}
.drawer-logout-btn:hover{background:rgba(139,26,26,0.4);color:var(--text);}
/* hide old nav */
.dash-nav{display:none;}
.dash-page{display:none;padding:3rem 2rem;}
.dash-page.active{display:block;}
.dash-page-container{max-width:1000px;margin:0 auto;}

/* ====== PAGE TITLES ====== */
.page-title{
  display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;
  padding-bottom:1rem;border-bottom:1px solid var(--border);
}
.page-title-icon{font-size:2rem;}
.page-title h2{font-size:1.8rem;font-weight:900;color:var(--text);}
.page-title span{font-size:0.8rem;color:var(--gold);letter-spacing:0.15em;}

/* ====== COURSES PAGE ====== */
.month-tabs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;}
.month-tab{
  padding:0.45rem 1rem;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.8rem;font-weight:600;
  cursor:pointer;transition:all 0.3s;
}
.month-tab.active,.month-tab:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.05);}
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
.lesson-card{
  background:var(--panel);border:1px solid var(--border);padding:1.5rem;
  position:relative;transition:all 0.3s;cursor:pointer;overflow:hidden;
}
.lesson-card::after{
  content:'';position:absolute;bottom:0;right:0;left:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform 0.3s;
}
.lesson-card:hover::after{transform:scaleX(1);}
.lesson-card:hover{border-color:rgba(201,168,76,0.35);}
.lesson-thumb{
  width:100%;aspect-ratio:16/9;background:var(--bg);
  margin-bottom:1rem;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.lesson-thumb img{width:100%;height:100%;object-fit:cover;}
